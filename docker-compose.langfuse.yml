# docker-compose.langfuse.yml — Standalone Langfuse observability stack.
#
# Started automatically by scripts/start.sh before the main stack.
# Uses its own dedicated Postgres so it is fully isolated from the application DB.
# Both services join the shared external network 'patient_gen_network' so that
# the api and worker containers can reach Langfuse at http://langfuse:3000.
#
# To use manually (without start.sh):
#   docker network create patient_gen_network
#   docker compose -f docker-compose.langfuse.yml up -d

services:
  postgres-langfuse:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - patient_gen_network

  langfuse:
    image: langfuse/langfuse:2
    depends_on:
      postgres-langfuse:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@postgres-langfuse:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: local-nextauth-secret-change-in-prod
      SALT: local-salt-change-in-prod
      TELEMETRY_ENABLED: "false"
    networks:
      - patient_gen_network

volumes:
  langfuse_postgres_data:

networks:
  patient_gen_network:
    external: true

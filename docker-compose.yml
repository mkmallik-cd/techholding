services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: patient_generation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d patient_generation"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8081 --reload
    env_file:
      - .env
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/patient_generation
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: rpc://
      CELERY_QUEUE_NAME: patient_generation.step1
      AWS_REGION: us-east-1
      DEFAULT_BEDROCK_MODEL_ID: us.anthropic.claude-3-5-sonnet-20241022-v2:0
      OUTPUT_BASE_DIR: /app/output
    ports:
      - "8081:8081"
    volumes:
      - ./:/app
      - ./output:/app/output
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build: .
    command: celery -A app.workers.celery_app:celery_app worker --loglevel=INFO --concurrency=2 -Q patient_generation.step1
    env_file:
      - .env
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/patient_generation
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: rpc://
      CELERY_QUEUE_NAME: patient_generation.step1
      AWS_REGION: us-east-1
      DEFAULT_BEDROCK_MODEL_ID: us.anthropic.claude-3-5-sonnet-20241022-v2:0
      OUTPUT_BASE_DIR: /app/output
    volumes:
      - ./:/app
      - ./output:/app/output
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

